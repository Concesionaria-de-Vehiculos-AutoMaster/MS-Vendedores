spring.application.name=ms-vendedores
# Puerto del servidor para MS-Modelos
server.port=8086

# Conexión a MariaDB (XAMPP por defecto no tiene contraseña en root)
spring.datasource.url=jdbc:mariadb://localhost:3306/db_stock?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Configuración de Hibernate (Spring Data JPA)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html