spring.application.name=ms-vendedores

# Conexión a MariaDB (XAMPP por defecto no tiene contraseña en root)
spring.datasource.url=jdbc:mariadb://localhost:3306/db_stock
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Configuración de Hibernate (Spring Data JPA)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true